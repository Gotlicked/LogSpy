modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "${mod_issue_tracker}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
displayURL = "${mod_display}"
logoFile="${mod_logo_file}"
credits="${mod_credits}"
authors = "${mod_author}"
description = '''${mod_description}'''

[[mixins]]
config = "logspy.mixins.json"

[[mixins]]
config = "logspy.neoforge.mixins.json"

[[dependencies."${mod_id}"]]
modId = "neoforge"
type="required"
versionRange = "${neoforge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type="required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"
